<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dot Animate — 9 States</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .ball-container {
    width: 96px; height: 96px;
    background: #1a1a1a;
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: transform 0.12s ease, background 0.25s ease;
  }
  .ball-container:hover { background: #1f1f1f; }
  .ball-container:active { transform: scale(0.93); }
  .state-label {
    color: #74B8D4; font-size: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    letter-spacing: 0.08em; text-transform: uppercase;
    min-height: 16px; transition: color 0.4s;
  }
  .nav { display: flex; gap: 7px; align-items: center; }
  .nav .dot {
    width: 5px; height: 5px;
    border-radius: 50%; background: #333;
    transition: background 0.4s, transform 0.4s;
  }
  .nav .dot.on { background: #74B8D4; transform: scale(1.4); }
  .hint { color: #333; font-size: 12px; letter-spacing: 0.02em; }
</style>
</head>
<body>

<div class="state-label" id="label">idle</div>
<div class="nav" id="nav"></div>
<div class="ball-container" id="trigger">
  <svg id="ball" width="52" height="52" viewBox="0 0 22 22"></svg>
</div>
<div class="hint">click to cycle</div>

<script>
// =====================================================================
//  Dot Animate — 9 states
//  idle → thinking → pulse → swirl → ripple → orbit → helix → nova → firefly
// =====================================================================

// ---------- Palette ----------
const RGB_F = [116, 184, 212];   // #74B8D4  front
const RGB_M = [60, 120, 168];    // #3C78A8  mid
const RGB_B = [26, 40, 64];      // #1A2840  back

// ---------- Fibonacci sphere: 40 points ----------
const PHI = Math.PI * (3 - Math.sqrt(5));
const N = 40;
const PTS = Array.from({ length: N }, (_, i) => {
  const y = 1 - (2 * i) / (N - 1);
  const r = Math.sqrt(1 - y * y);
  const t = PHI * i;
  return { x: Math.cos(t) * r, y, z: Math.sin(t) * r };
});

// ---------- Idle hex grid: 14 dots, diamond 2-3-4-3-2 ----------
const SP = 2.8, HH = SP * .75, CX = 11, CY = 11;
const ROWS = [[-0.5,0.5],[-1,0,1],[-1.5,-0.5,0.5,1.5],[-1,0,1],[-0.5,0.5]];
const GRID = [];
ROWS.forEach((ox, ri) => { const y = CY+(ri-2)*HH; ox.forEach(o => GRID.push({x:CX+o*SP,y})); });
GRID.sort((a, b) => a.y - b.y || a.x - b.x);

// Map 14 front-facing fib points → grid slots
function rot(pt, cY, sY, cX, sX) {
  const rx = pt.x*cY+pt.z*sY, rz = -pt.x*sY+pt.z*cY;
  return { x:rx, y:pt.y*cX-rz*sX, z:pt.y*sX+rz*cX };
}
const cX0 = Math.cos(.2), sX0 = Math.sin(.2);
const top14 = [...PTS.map((pt,idx) => {
  const c = rot(pt,1,0,cX0,sX0); return {depth:(c.z+1)/2,idx};
})].sort((a,b) => b.depth-a.depth).slice(0,14);
top14.sort((a,b) => {
  const ca=rot(PTS[a.idx],1,0,cX0,sX0), cb=rot(PTS[b.idx],1,0,cX0,sX0);
  return ca.y-cb.y||ca.x-cb.x;
});
const slot = new Int8Array(N).fill(-1);
top14.forEach((p,i) => slot[p.idx]=i);

// ---------- Helpers ----------
const lerp    = (a,b,t) => a+(b-a)*t;
const clamp   = v => v<0?0:v>1?1:v;
const easeO3  = t => 1-(1-t)**3;
const easeIO3 = t => t<.5?4*t*t*t:1-(-2*t+2)**3/2;
const rgbStr  = c => `rgb(${c[0]|0},${c[1]|0},${c[2]|0})`;
const lerpC   = (a,b,t) => [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t];
const dRGB    = d => d>.65?RGB_F:d>.4?RGB_M:RGB_B;

// =====================================================================
//  9 STATE FUNCTIONS — each (time) → particle[40]
//  particle: { sx, sy, depth, r, opacity, rgb, idx }
// =====================================================================

// 0 ── IDLE: static hex grid ──────────────────────────────────────────
function stateIdle() {
  return PTS.map((_,idx) => {
    const s = slot[idx];
    if (s >= 0) { const g=GRID[s]; return {sx:g.x,sy:g.y,depth:.8,r:.62,opacity:.88,rgb:RGB_F,idx}; }
    return {sx:CX,sy:CY,depth:0,r:.2,opacity:0,rgb:RGB_F,idx};
  });
}

// 1 ── THINKING: Y-spin + horizontal band sweep ──────────────────────
function stateThinking(time) {
  const a=time*1.4, cY=Math.cos(a), sY=Math.sin(a), cX=Math.cos(.2), sX=Math.sin(.2);
  return PTS.map((pt,idx) => {
    const c=rot(pt,cY,sY,cX,sX), d=(c.z+1)/2;
    let r=.95*(.4+.6*d), op=(.2+.8*d)*.9;
    const band=Math.abs(c.x-.85*Math.sin(2.2*time));
    if (band<.5&&d>.25){const i=(1-band/.5)*Math.min(1,(d-.25)/.3);r*=1+.7*i;op=Math.min(1,op+.9*i);}
    return {sx:9.5*c.x+CX,sy:9.5*c.y+CY,depth:d,r:Math.max(.4,r),opacity:clamp(op),rgb:dRGB(d),idx};
  });
}

// 2 ── PULSE: breathing scale + vertical glow wave ───────────────────
function statePulse(time) {
  const a=time*.35, breath=1+.14*Math.sin(time*1.8);
  const cY=Math.cos(a),sY=Math.sin(a),cX=Math.cos(.3),sX=Math.sin(.3);
  return PTS.map((pt,idx) => {
    const c=rot(pt,cY,sY,cX,sX), d=(c.z+1)/2, R=9.5*breath;
    const wave=.5+.5*Math.sin(time*1.8-c.y*2);
    const r=.45+.35*d+.2*wave, op=(.25+.5*d+.25*wave)*.95;
    return {sx:R*c.x+CX,sy:R*c.y+CY,depth:d,r:Math.max(.35,r),opacity:clamp(op),rgb:dRGB(d),idx};
  });
}

// 3 ── SWIRL: differential rotation (tornado) + spiral band ──────────
function stateSwirl(time) {
  const cX=Math.cos(.38),sX=Math.sin(.38);
  return PTS.map((pt,idx) => {
    const lat=pt.y, spd=1.6*(1+.8*lat), a=time*spd;
    const cA=Math.cos(a),sA=Math.sin(a);
    const rx=pt.x*cA+pt.z*sA, rz=-pt.x*sA+pt.z*cA;
    const x=rx, y=pt.y*cX-rz*sX, z=pt.y*sX+rz*cX, d=(z+1)/2;
    const sa=Math.atan2(rz,rx), phase=sa-time*2.8+lat*Math.PI;
    const hi=Math.max(0,(.5+.5*Math.sin(phase))-.7)/.3;
    const r=.95*(.4+.6*d)*(1+.5*hi), op=((.2+.8*d)+.3*hi)*.9;
    return {sx:9.5*x+CX,sy:9.5*y+CY,depth:d,r:Math.max(.4,r),opacity:clamp(op),rgb:dRGB(d),idx};
  });
}

// 4 ── RIPPLE: concentric wave from pole + crest highlight ───────────
function stateRipple(time) {
  const a=time*.18, cY=Math.cos(a),sY=Math.sin(a),cX=Math.cos(.22),sX=Math.sin(.22);
  return PTS.map((pt,idx) => {
    const dist=Math.acos(Math.max(-1,Math.min(1,pt.y)));
    const wave=Math.sin(dist*3.5-time*2.8)*.16, sc=1+wave;
    const dp={x:pt.x*sc,y:pt.y*sc,z:pt.z*sc};
    const c=rot(dp,cY,sY,cX,sX), d=(c.z+1)/2;
    const crest=.5+.5*Math.cos(dist*3.5-time*2.8);
    const hi=crest>.78?(crest-.78)/.22:0;
    const r=.95*(.4+.6*d)*(1+.4*hi), op=((.2+.8*d)+.25*hi)*.9;
    return {sx:9.5*c.x+CX,sy:9.5*c.y+CY,depth:d,r:Math.max(.4,r),opacity:clamp(op),rgb:dRGB(d),idx};
  });
}

// 5 ── ORBIT: 3 orbital rings + comet-trail band ─────────────────────
function stateOrbit(time) {
  const rings = [
    { tx:  .25, tz:  0,   spd:  1.3, s: 0,  n: 14 },
    { tx: 1.15, tz:  .55, spd: -.85, s: 14, n: 13 },
    { tx: -.75, tz: -.4,  spd:  .6,  s: 27, n: 13 },
  ];
  return PTS.map((pt, idx) => {
    const ring = rings.find(r => idx >= r.s && idx < r.s + r.n);
    const pos = idx - ring.s;
    const angle = (pos / ring.n) * Math.PI * 2 + time * ring.spd;

    let x = Math.cos(angle), y = 0, z = Math.sin(angle);
    const cx1=Math.cos(ring.tx),sx1=Math.sin(ring.tx);
    let y1=y*cx1-z*sx1, z1=y*sx1+z*cx1;
    const cz1=Math.cos(ring.tz),sz1=Math.sin(ring.tz);
    const x2=x*cz1-y1*sz1, y2=x*sz1+y1*cz1;

    const d = clamp((z1+1)/2);
    // Comet trail: bright arc chasing each ring at 1.6× ring speed
    const ref = time * ring.spd * 1.6;
    const diff = Math.atan2(Math.sin(angle-ref), Math.cos(angle-ref));
    const trail = Math.abs(diff);
    const hi = trail < .8 ? (1-trail/.8)**2 : 0;

    const r = Math.max(.38, (.42+.44*d)*(1+.6*hi));
    const op = clamp((.2+.7*d) + .5*hi);
    return { sx:8.5*x2+CX, sy:8.5*y2+CY, depth:d,
             r, opacity:op, rgb: hi>.4 ? lerpC(dRGB(d),RGB_F,hi) : dRGB(d), idx };
  });
}

// 6 ── HELIX: DNA double helix + traveling pulse band ────────────────
function stateHelix(time) {
  return PTS.map((pt, idx) => {
    const strand = idx % 2;
    const pos = Math.floor(idx / 2);
    const t = pos / 19;                                     // 0 → 1 along strand

    const angle = t * 1.5 * 2 * Math.PI                     // 1.5 turns
                + strand * Math.PI                           // 180° strand offset
                + time * .9;                                 // rotation speed

    const x = Math.cos(angle);
    const z = Math.sin(angle);
    const y = t * 2 - 1;                                    // −1 → +1 top to bottom
    const d = clamp((z + 1) / 2);

    // Traveling pulse: bright dot runs along each strand and wraps
    const pulseT = ((time * .5 + strand * .5) % 1);         // offset per strand
    const dist = Math.abs(t - pulseT);
    const wrap = Math.min(dist, 1 - dist);
    const hi = wrap < .12 ? (1 - wrap/.12)**2 : 0;

    const r = Math.max(.38, (.42+.42*d)*(1+.7*hi));
    const op = clamp((.2+.72*d) + .55*hi);
    return { sx: x*5.2+CX, sy: y*7.2+CY, depth: d,
             r, opacity: op, rgb: hi>.3 ? lerpC(dRGB(d),RGB_F,hi) : dRGB(d), idx };
  });
}

// 7 ── NOVA: cascading radial pulse + sweeping latitude band ─────────
function stateNova(time) {
  const a=time*.4, cY=Math.cos(a),sY=Math.sin(a),cX=Math.cos(.2),sX=Math.sin(.2);
  return PTS.map((pt, idx) => {
    // Cascading radial pulse: each point expands/contracts with phase offset
    const lon = Math.atan2(pt.z, pt.x);
    const delay = lon*.4 + pt.y*.7;
    const pulse = Math.sin(time*1.6 + delay);
    const scale = .65 + .35*pulse;                           // 0.3 → 1.0

    const c = rot(pt, cY, sY, cX, sX);
    const d = clamp((c.z*scale+1)/2);

    // Scanning band: horizontal sweep in object space
    const bandY = Math.sin(time*1.3);
    const bandDist = Math.abs(pt.y - bandY);
    const hi = bandDist < .28 ? (1-bandDist/.28)**1.5 : 0;

    const r = .95*(.4+.6*d)*(1+.65*hi);
    const op = ((.2+.8*d)+.45*hi)*.9;
    return { sx:9.5*scale*c.x+CX, sy:9.5*scale*c.y+CY, depth:d,
             r:Math.max(.4,r), opacity:clamp(op),
             rgb: hi>.4 ? lerpC(dRGB(d),RGB_F,hi) : dRGB(d), idx };
  });
}

// 8 ── FIREFLY: organic drift + twinkling + sweeping searchlight ─────
function stateFirefly(time) {
  // Searchlight: a soft glow sweeping through the cloud
  const glowX = Math.sin(time*.55)*.75;
  const glowY = Math.cos(time*.38)*.75;

  return PTS.map((pt, idx) => {
    const s = idx * 1.618033;

    // Multi-frequency slow drift
    const dx = Math.sin(time*.31+s*3.7)*.45 + Math.sin(time*.17+s*2.3)*.25;
    const dy = Math.cos(time*.23+s*4.1)*.45 + Math.sin(time*.13+s*1.9)*.25;
    const dz = Math.sin(time*.19+s*5.3)*.35;

    const x = pt.x*.75+dx, y = pt.y*.75+dy, z = pt.z*.55+dz;
    const d = clamp((z+1)/2);

    // Per-dot twinkle
    const twSpd = 1.5+Math.sin(s*7.1)*.8;
    const tw = .5+.5*Math.sin(time*twSpd+s*13.3);
    const flash = tw>.82 ? (tw-.82)/.18 : 0;

    // Searchlight glow proximity
    const glowDist = Math.sqrt((x-glowX)**2+(y-glowY)**2);
    const glow = glowDist < .65 ? (1-glowDist/.65)**.8 : 0;

    const hi = Math.max(flash, glow);
    const r  = Math.max(.3, .38+.2*d+.35*hi);
    const op = clamp(.2+.25*d+.3*tw+.35*glow);
    return { sx:8*x+CX, sy:8*y+CY, depth:d, r, opacity:op,
             rgb: hi>.4 ? lerpC(d>.5?RGB_M:RGB_B, RGB_F, hi) : (d>.5?RGB_M:RGB_B), idx };
  });
}

// =====================================================================
//  State registry
// =====================================================================
const STATES = [
  { name: 'idle',     fn: stateIdle },
  { name: 'thinking', fn: stateThinking },
  { name: 'pulse',    fn: statePulse },
  { name: 'swirl',    fn: stateSwirl },
  { name: 'ripple',   fn: stateRipple },
  { name: 'orbit',    fn: stateOrbit },
  { name: 'helix',    fn: stateHelix },
  { name: 'nova',     fn: stateNova },
  { name: 'firefly',  fn: stateFirefly },
];

// ---------- Blend ----------
function blend(from, to, t) {
  return from.map((f, i) => {
    const p = to[i];
    return {
      sx:lerp(f.sx,p.sx,t), sy:lerp(f.sy,p.sy,t),
      depth:lerp(f.depth,p.depth,t),
      r:Math.max(.2,lerp(f.r,p.r,t)),
      opacity:clamp(lerp(f.opacity,p.opacity,t)),
      rgb:lerpC(f.rgb,p.rgb,t), idx:f.idx,
    };
  });
}

// ---------- DOM ----------
const svg=document.getElementById("ball"),
      trigger=document.getElementById("trigger"),
      labelEl=document.getElementById("label"),
      navEl=document.getElementById("nav"),
      ns="http://www.w3.org/2000/svg";

const circles = PTS.map(() => { const el=document.createElementNS(ns,"circle"); svg.appendChild(el); return el; });
const dots = STATES.map((_,i) => { const d=document.createElement("span"); d.className="dot"+(i===0?" on":""); navEl.appendChild(d); return d; });

// ---------- State machine ----------
let fromIdx=0, toIdx=0, progress=1, trStart=null;

function trDur(f,t) { return STATES[t].name==='idle'?1.2:STATES[f].name==='idle'?.7:.8; }
function trEase(f)   { return STATES[f].name==='idle'?easeO3:easeIO3; }

trigger.addEventListener("click", () => {
  fromIdx=toIdx; toIdx=(toIdx+1)%STATES.length; progress=0; trStart=null;
  labelEl.textContent=STATES[toIdx].name;
  dots.forEach((d,i) => d.classList.toggle("on",i===toIdx));
});

// ---------- Animation loop ----------
let elapsed=0, lastTime=0;

function frame(now) {
  const t=now/1e3, dt=lastTime===0?.016:Math.min(t-lastTime,.05);
  lastTime=t; elapsed+=dt;

  if (progress<1) {
    if (!trStart) trStart=t;
    const raw=clamp((t-trStart)/trDur(fromIdx,toIdx));
    progress=trEase(fromIdx)(raw);
    if (raw>=1) progress=1;
  }

  let particles = progress>=1
    ? STATES[toIdx].fn(elapsed)
    : blend(STATES[fromIdx].fn(elapsed), STATES[toIdx].fn(elapsed), progress);

  particles.forEach(p => {
    const el=circles[p.idx];
    el.setAttribute("cx",p.sx); el.setAttribute("cy",p.sy);
    el.setAttribute("r",p.r);   el.setAttribute("fill",rgbStr(p.rgb));
    el.setAttribute("opacity",p.opacity<.005?0:p.opacity);
    el._d=p.depth;
  });
  [...circles].sort((a,b) => a._d-b._d).forEach(el => svg.appendChild(el));

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
